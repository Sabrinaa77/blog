<h1>Blog首頁</h1>

<a href="{% url 'blogs:new' %}">新增文章</a>

<ul>
  {% for blog in blogs %}
  <li>
    <a href="{% url 'blogs:show' blog.id %}">
      <section>
        <h3>{{ blog.title }}</h3>
        <h3>{{ blog.content }}</h3>
        <h3>{{ blog.created_at }}</h3>
        <h3>{{ blog.updated_at }}</h3>
        <h3>{{ blog.published }}</h3>
      </section>
    </a>
  </li>
  {% endfor %}
</ul>
